<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Issue Triage Field Planner</title>
  <desc id="desc">A warm paper-style cover with issue cards, duplicate clusters, owner gates, and saved-view chips.</desc>
  <rect width="1200" height="630" rx="36" fill="#F7F3EE"/>
  <rect x="52" y="52" width="1096" height="526" rx="28" fill="#FFFDFB" stroke="#E2D7CD" stroke-width="2"/>
  <path d="M84 142C84 122.118 100.118 106 120 106H1080C1099.88 106 1116 122.118 1116 142V168H84V142Z" fill="#F2E0D8"/>
  <text x="116" y="156" fill="#8C3424" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Issue Triage Field Planner</text>
  <text x="116" y="212" fill="#1F2427" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">Turn noisy GitHub issues into</text>
  <text x="116" y="270" fill="#1F2427" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">a deterministic triage brief</text>
  <text x="116" y="318" fill="#61656B" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">Duplicate clusters · owner gates · field coverage · saved-view fit</text>

  <rect x="116" y="372" width="264" height="92" rx="20" fill="#FFFFFF" stroke="#E2D7CD" stroke-width="2"/>
  <text x="140" y="408" fill="#8C3424" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Duplicate cluster</text>
  <text x="140" y="436" fill="#1F2427" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Merge 3 reports</text>

  <rect x="404" y="372" width="264" height="92" rx="20" fill="#FFFFFF" stroke="#E2D7CD" stroke-width="2"/>
  <text x="428" y="408" fill="#8C3424" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Owner gate</text>
  <text x="428" y="436" fill="#1F2427" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Assign missing owner</text>

  <rect x="692" y="372" width="392" height="92" rx="20" fill="#FFFFFF" stroke="#E2D7CD" stroke-width="2"/>
  <text x="716" y="408" fill="#8C3424" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Saved-view fit</text>
  <text x="716" y="436" fill="#1F2427" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Blockers first, duplicates second</text>

  <g transform="translate(780 196)">
    <rect x="0" y="0" width="268" height="136" rx="24" fill="#F2E0D8" stroke="#D9B6A6" stroke-width="2"/>
    <text x="24" y="40" fill="#8C3424" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Readiness score</text>
    <text x="24" y="92" fill="#1F2427" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900">87</text>
    <text x="98" y="86" fill="#1F2427" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">/ 100</text>
    <text x="24" y="114" fill="#61656B" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">duplicate coverage + owner map</text>
  </g>

  <g transform="translate(796 518)">
    <rect x="0" y="0" width="232" height="34" rx="17" fill="#1F2427"/>
    <text x="20" y="22" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Deterministic demo · no live GitHub API</text>
  </g>
</svg>
