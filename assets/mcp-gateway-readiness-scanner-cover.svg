<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="28" x2="1020" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glowA" x1="120" y1="100" x2="420" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowB" x1="540" y1="80" x2="860" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowC" x1="850" y1="250" x2="1110" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="44"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="190" cy="150" r="130" fill="url(#glowA)" filter="url(#blur)"/>
  <circle cx="720" cy="118" r="180" fill="url(#glowB)" filter="url(#blur)" opacity="0.7"/>
  <circle cx="980" cy="470" r="200" fill="url(#glowC)" filter="url(#blur)" opacity="0.55"/>

  <text x="74" y="96" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">MCP Gateway Readiness Scanner</text>
  <text x="76" y="140" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">Map gateway source, inventory, owners, and a rollout checklist before the next change lands.</text>

  <g filter="url(#blur)" opacity="0.18">
    <rect x="70" y="180" width="290" height="250" rx="28" fill="#38BDF8"/>
    <rect x="450" y="150" width="320" height="310" rx="28" fill="#34D399"/>
    <rect x="830" y="210" width="300" height="230" rx="28" fill="#F59E0B"/>
  </g>

  <rect x="70" y="180" width="290" height="250" rx="28" fill="url(#card)" stroke="rgba(255,255,255,0.16)"/>
  <rect x="450" y="150" width="320" height="310" rx="28" fill="#0B1220" stroke="rgba(255,255,255,0.16)"/>
  <rect x="830" y="210" width="300" height="230" rx="28" fill="url(#card)" stroke="rgba(255,255,255,0.16)"/>

  <rect x="92" y="200" width="246" height="36" rx="14" fill="#38BDF8"/>
  <rect x="474" y="172" width="272" height="36" rx="14" fill="#34D399"/>
  <rect x="852" y="232" width="256" height="36" rx="14" fill="#F59E0B"/>

  <text x="105" y="294" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Gateway source</text>
  <text x="105" y="335" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19">Release note, docs, or changelog</text>
  <text x="105" y="364" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19">+ risk, owner, and action mapping</text>

  <text x="488" y="266" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Inventory &amp; owners</text>
  <text x="488" y="307" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19">Critical items, watch items, opportunity</text>
  <text x="488" y="336" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19">Deterministic matrix with rollback hints</text>
  <text x="488" y="365" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19">Exportable Markdown brief</text>

  <text x="868" y="322" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Rollout checklist</text>
  <text x="868" y="363" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19">What to fix, who owns it,</text>
  <text x="868" y="392" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19">and what to verify next</text>

  <g stroke="#94A3B8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M360 304 H444"/>
    <path d="M772 300 H828"/>
    <path d="M360 304 C390 304 402 286 444 278"/>
    <path d="M772 300 C801 300 812 315 828 320"/>
  </g>
  <g fill="#94A3B8">
    <circle cx="360" cy="304" r="8"/>
    <circle cx="444" cy="278" r="8"/>
    <circle cx="772" cy="300" r="8"/>
    <circle cx="828" cy="320" r="8"/>
  </g>

  <rect x="74" y="528" width="1052" height="56" rx="18" fill="rgba(15, 23, 42, 0.9)" stroke="rgba(255,255,255,0.14)"/>
  <text x="104" y="562" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Deterministic static demo • 3 presets • 6 inventory rows each • Markdown export</text>
  <text x="104" y="585" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">No live ingestion, no external network, no automatic dispatch</text>
</svg>
