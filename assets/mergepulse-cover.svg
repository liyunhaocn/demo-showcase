  <rect x="444" y="414" width="120" height="34" rx="10" fill="#F3D8D8"/>
  <text x="468" y="436" fill="#B23A3A" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">critical</text>
  <rect x="578" y="414" width="98" height="34" rx="10" fill="#E5F3EC"/>
  <text x="598" y="436" fill="#0B7654" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">review</text>
  <text x="444" y="486" fill="#5F7069" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500">Owners, actions, and merge blockers in one deterministic brief.</text>

  <rect x="748" y="348" width="366" height="176" rx="20" fill="#EEF3EF" stroke="#D8E0D9"/>
  <text x="774" y="388" fill="#18231D" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Action checklist</text>
