  <text x="86" y="238" fill="#18231D" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">PR merge readiness radar</text>
  <text x="86" y="286" fill="#5F7069" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">Turn each pull request into a risk matrix, owner map, and merge checklist.</text>

  <rect x="86" y="348" width="300" height="176" rx="20" fill="#EEF3EF" stroke="#D8E0D9"/>
