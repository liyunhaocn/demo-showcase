  <text x="112" y="444" fill="#0B7654" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="800">84</text>
  <text x="196" y="438" fill="#5F7069" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">/ 100</text>
  <rect x="112" y="474" width="244" height="14" rx="7" fill="#D8E0D9"/>
  <rect x="112" y="474" width="198" height="14" rx="7" fill="#0B7654"/>

  <rect x="418" y="348" width="310" height="176" rx="20" fill="#FBFCFA" stroke="#D8E0D9"/>
