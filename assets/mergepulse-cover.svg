<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" rx="32" fill="#F3F6F2"/>
  <rect x="54" y="52" width="1092" height="526" rx="28" fill="#FFFFFF" stroke="#D8E0D9"/>
