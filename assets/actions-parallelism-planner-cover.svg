    <circle cx="410" cy="175" r="8" />
    <circle cx="585" cy="115" r="8" />
    <circle cx="585" cy="235" r="8" />
    <circle cx="585" cy="315" r="8" />
    <circle cx="785" cy="115" r="8" />
    <circle cx="785" cy="235" r="8" />
    <circle cx="785" cy="315" r="8" />
    <circle cx="990" cy="155" r="8" />
    <circle cx="990" cy="235" r="8" />
    <circle cx="990" cy="275" r="8" />
  </g>
</svg>
