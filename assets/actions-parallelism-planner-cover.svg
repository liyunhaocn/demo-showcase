<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Actions Parallelism Planner</title>
  <desc id="desc">A blueprint style cover showing GitHub Actions steps branching into parallel lanes and reconverging at a release gate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10233F" />
      <stop offset="1" stop-color="#1B4F8C" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7DD3FC" />
      <stop offset="1" stop-color="#22C55E" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.05 0 1 0 0 0.35 0 0 1 0 0.7 0 0 0 0.7 0" />
    </filter>
  </defs>

  <rect width="1200" height="630" rx="40" fill="url(#bg)" />
  <circle cx="250" cy="150" r="120" fill="#4C8DFF" fill-opacity="0.18" filter="url(#glow)" />
  <circle cx="935" cy="495" r="150" fill="#22C55E" fill-opacity="0.16" filter="url(#glow)" />

  <g opacity="0.2" stroke="#D9ECFF" stroke-width="2">
    <path d="M80 110H1120" />
    <path d="M80 190H1120" />
    <path d="M80 270H1120" />
    <path d="M80 350H1120" />
    <path d="M80 430H1120" />
    <path d="M80 510H1120" />
  </g>

  <g stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <path d="M180 175C290 175 320 175 410 175" />
    <path d="M410 175C500 175 500 115 585 115" />
    <path d="M410 175C500 175 500 235 585 235" />
    <path d="M410 175C500 175 500 315 585 315" />
    <path d="M585 115C675 115 700 115 785 115" />
    <path d="M585 235C675 235 700 235 785 235" />
    <path d="M585 315C675 315 700 315 785 315" />
    <path d="M785 115C875 115 900 155 990 155" />
    <path d="M785 235C875 235 900 235 990 235" />
    <path d="M785 315C875 315 900 275 990 275" />
  </g>

  <g fill="#F8FBFF" stroke="#A7C4FF" stroke-width="3">
    <rect x="120" y="140" width="120" height="70" rx="18" fill="#0E1F38" />
    <rect x="360" y="140" width="100" height="70" rx="18" fill="#143054" />
    <rect x="560" y="80" width="130" height="70" rx="18" fill="#163F70" />
    <rect x="560" y="200" width="130" height="70" rx="18" fill="#163F70" />
    <rect x="560" y="280" width="130" height="70" rx="18" fill="#163F70" />
    <rect x="820" y="80" width="160" height="70" rx="18" fill="#1C5793" />
    <rect x="820" y="200" width="160" height="70" rx="18" fill="#1C5793" />
    <rect x="820" y="280" width="160" height="70" rx="18" fill="#1C5793" />
    <rect x="1030" y="140" width="120" height="70" rx="18" fill="#0E1F38" />
    <rect x="1030" y="250" width="120" height="70" rx="18" fill="#0E1F38" />
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" fill="#EAF2FF">
    <text x="96" y="74" font-size="34" font-weight="800" letter-spacing="0.08em">GITHUB ACTIONS</text>
    <text x="96" y="110" font-size="22" opacity="0.9">PARALLELISM PLANNER</text>
    <text x="144" y="182" font-size="18" font-weight="700">workflow</text>
    <text x="384" y="182" font-size="18" font-weight="700">split</text>
    <text x="592" y="122" font-size="16" font-weight="700">lint</text>
    <text x="592" y="242" font-size="16" font-weight="700">tests</text>
    <text x="592" y="322" font-size="16" font-weight="700">docs</text>
    <text x="846" y="122" font-size="16" font-weight="700">background</text>
    <text x="848" y="242" font-size="16" font-weight="700">wait-all</text>
    <text x="848" y="322" font-size="16" font-weight="700">serial gate</text>
    <text x="1058" y="182" font-size="18" font-weight="700">release</text>
    <text x="1056" y="292" font-size="18" font-weight="700">checklist</text>
  </g>

  <g fill="#7DD3FC" opacity="0.9">
